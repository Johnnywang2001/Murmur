name: Murmur
options:
  bundleIdPrefix: com.murmur
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.4"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "8957296QYR"
    CODE_SIGN_STYLE: Automatic

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.17.0"

targets:
  Murmur:
    type: application
    platform: iOS
    sources:
      - Sources/Murmur
      - Sources/Shared
    dependencies:
      - package: WhisperKit
      - target: MurmurKeyboard
        embed: true
    settings:
      base:
        INFOPLIST_FILE: Sources/Murmur/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Murmur/Murmur.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.murmurkeyboard.app
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Sources/Murmur/Info.plist
      properties:
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: com.murmurkeyboard.app
            CFBundleURLSchemes:
              - murmur
        NSMicrophoneUsageDescription: "Murmur needs microphone access to transcribe your speech on-device."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  MurmurKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - Sources/MurmurKeyboard
      - Sources/Shared
    settings:
      base:
        INFOPLIST_FILE: Sources/MurmurKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/MurmurKeyboard/MurmurKeyboard.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.murmurkeyboard.app.keyboard
    info:
      path: Sources/MurmurKeyboard/Info.plist
      properties:
        CFBundleDisplayName: Murmur
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController

schemes:
  Murmur:
    build:
      targets:
        Murmur: all
        MurmurKeyboard: all
    run:
      config: Debug
